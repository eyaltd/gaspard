name: painauchocolat

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:EpitechPGE1-2025/G-DOP-200-NAN-2-1-bschocolatine-23.git"
  EXECUTABLES: "idk.sh"

jobs:
  share_env_vars:
    name: Make env vars available to other jobs
    runs-on: ubuntu-latest
    outputs:
      mirror_ssh_url: ${{ steps.mirror_ssh_url.outputs.mirror_ssh_url }}
    steps:
      - name: Set mirror_ssh_url in job output
        id: mirror_ssh_url
        run: echo "mirror_ssh_url=${{ env.MIRROR_SSH_URL }}" >> $GITHUB_OUTPUT

  check_compilation_and_coding_style:
    name: Check compilation and coding style
    needs: share_env_vars
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.share_env_vars.outputs.mirror_ssh_url, github.repository) }}
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check repository with banana-check-repo
        run: banana-check-repo

      - name: Compile project with make
        run: make 2> coding-style-reports.txt
        timeout-minutes: 2
        env:
          CC: epiclang

      - name: Display coding style errors
        shell: bash
        run: |
          if [ -s coding-style-reports.txt ]; then
            while IFS= read -r line; do
              echo "DEBUG : $line"
            done
          fi
      - name: Fail if there are coding style errors
        shell: bash
        run: |
          if [ -s coding-style-reports.log ]; then
            exit 1
          fi
      - name: Cleans the project
        run: make clean

      - name: Check executables
        run: |
          IFS=','
          for exec in "$EXECUTABLES"; do
            if [ ! -f "$exec" ]; then
              echo "::error::$exec is missing"
              exit 1
            fi
            if [ ! -x "$exec" ]; then
              echo "::error::$exec is not executable"
              exit 1
            fi
          done
  run_tests:
    name: Run unit/functional tests
    needs: check_compilation_and_coding_style
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Make tests run
        timeout-minutes: 2
        run: make tests_run

  push_to_mirror:
    name: Push to mirror repository
    runs-on: ubuntu-latest
    needs: run_tests
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
